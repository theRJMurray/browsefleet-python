name: Bug report
description: Something is not working as documented.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Confirm on the latest published version first. Security issues: do NOT file here; see [SECURITY.md](https://github.com/theRJMurray/browsefleet-python/blob/master/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code snippet.
      render: python
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: Output of `pip show browsefleet`.
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.7"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: BrowseFleet server version
      description: From `GET /health` on your server.

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Which client?
      options:
        - BrowseFleet (sync)
        - AsyncBrowseFleet (async)
        - Both
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/theRJMurray/browsefleet-python/blob/master/CODE_OF_CONDUCT.md).
          required: true
