name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read   # required by actions/checkout under restrictive default workflow permissions
      id-token: write  # required by PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish via Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # Requires PyPI Trusted Publisher configured for this repo + workflow + environment.
        # https://docs.pypi.org/trusted-publishers/
